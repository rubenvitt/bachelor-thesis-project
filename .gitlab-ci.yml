image: docker:latest

cache:
  paths:
    - ./frontend-dev/node_modules/
    - ./frontend-server/node_modules/
    - $CI_PROJECT_DIR/cache

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/cache/.m2/repository"

stages:
  - test
  - build
  - deploy

office-test:
  image: maven:3.6.0-jdk-11
  stage: test
  artifacts:
    expire_in: 1 week
    paths:
      - ./office365-tests/target/surfire-reports
    when: on_failure
  script:
    - cd office365-tests
    - mvn test
  tags:
    - docker

office-build:
  image: maven:3.6.0-jdk-11
  stage: build
  artifacts:
    expire_in: 1 week
    paths:
      - ./office365-tests/target/*.war
  script:
    - cd office365-tests
    - mvn package -DskipTests
  tags:
    - docker

office-deploy-docker:
  image: docker:latest
  stage: deploy
  script:
    - cd office365-tests
    - echo "this stage needs to be implemented"
    #- docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN docker.fme.de
    #- docker build -t docker.fme.de/r.vitt/bsc/office365:test .
    #- docker push docker.fme.de/r.vitt/bsc/office365:test
  tags:
    - docker

frontend-build:
  image: node:latest
  stage: build
  artifacts:
    expire_in: 1 week
    paths:
      - ./frontend-server/public
  script:
    - cd frontend-dev
    - npm install
    - npm run build || true #true, because build will "fail"
  tags:
    - docker

frontend-deploy-docker:
  image: docker:latest
  stage: deploy
  before_script:
    - echo "build will be plattform-dependent!"
  script:
    - cd frontend-server
    - echo "needs to be done (login fails)"
    - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN docker.fme.de
    - docker build -t docker.fme.de/r.vitt/bsc/frontend .
    - docker push docker.fme.de/r.vitt/bsc/frontend
  tags:
    - docker
