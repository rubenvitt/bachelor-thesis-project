version: "3.3"

services:
  frontend:
    image: docker.fme.de/r.vitt/bsc/frontend
    ports:
      - 3333:3000

  backend:
    image: docker.fme.de/r.vitt/bsc/backend
    restart: unless-stopped
    environment:
      - DB_HOST=database
    ports:
      - 8443:8443
    depends_on:
      - database

  database:
    image: docker.fme.de/r.vitt/bsc/database
    ports:
      - 5432:5432

